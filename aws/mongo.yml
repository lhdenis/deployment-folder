apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: microservices-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: orderdb
          # Là aussi, pour un TP on reste sans volume persistant

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: microservices-app
spec:
  selector:
    app: mongo
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017
  type: ClusterIP
